name: Publish To Thunderstore

on:
  pull_request:
    types:
      - closed
    branches:
      - deployment
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: thunderstore-publish-deployment
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.ref }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Validate bundled dependency DLLs
        shell: pwsh
        run: |
          $required = @(
            "dependencies/BepInEx.dll",
            "dependencies/0Harmony.dll",
            "dependencies/Assembly-CSharp.dll",
            "dependencies/UnityEngine.dll",
            "dependencies/UnityEngine.CoreModule.dll",
            "dependencies/UnityEngine.AudioModule.dll",
            "dependencies/UnityEngine.UIModule.dll",
            "dependencies/UnityEngine.UI.dll",
            "dependencies/UnityEngine.TextRenderingModule.dll",
            "dependencies/UnityEngine.IMGUIModule.dll",
            "dependencies/UnityEngine.InputLegacyModule.dll",
            "dependencies/Unity.Netcode.Runtime.dll",
            "dependencies/Unity.InputSystem.dll"
          )

          $missing = $required | Where-Object { -not (Test-Path -LiteralPath $_) }
          if ($missing.Count -gt 0) {
            $missing | ForEach-Object { Write-Host "Missing required dependency: $_" }
            throw "One or more required dependency DLLs are missing from the repository."
          }

      - name: Build plugin DLL
        run: dotnet build UniversalVolumeController.csproj -c Release

      - name: Parse manifest metadata
        id: manifest
        shell: bash
        run: |
          echo "version=$(jq -r '.version_number' manifest.json)" >> "$GITHUB_OUTPUT"
          echo "description=$(jq -r '.description' manifest.json)" >> "$GITHUB_OUTPUT"
          echo "website=$(jq -r '.website_url' manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Create Thunderstore zip package
        shell: pwsh
        run: ./scripts/package-thunderstore.ps1 -OutputZip artifacts/UniversalVolumeController.zip

      - name: Upload to Thunderstore
        uses: GreenTF/upload-thunderstore-package@v4.3
        with:
          token: ${{ secrets.THUNDERSTORE_TOKEN }}
          community: lethal-company
          repo: thunderstore.io
          namespace: ItsJustLiliana
          name: UniversalVolumeController
          version: ${{ steps.manifest.outputs.version }}
          description: ${{ steps.manifest.outputs.description }}
          website: ${{ steps.manifest.outputs.website }}
          categories: |
            clientside
            audio
            bepinex
          deps: |
            BepInEx-BepInExPack@5.4.2100
          file: artifacts/UniversalVolumeController.zip

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.manifest.outputs.version }}
          name: Universal Volume Controller
          body: ""
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: artifacts/UniversalVolumeController.zip
